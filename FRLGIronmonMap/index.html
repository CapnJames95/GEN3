(function(){
  var THEME_CSS=[
    '.MuiPaper-root{background-color:rgba(13,15,26,0.96)!important;color:#e8e8f0!important;box-shadow:0 4px 24px rgba(0,0,0,0.6)!important;border:1px solid rgba(255,255,255,0.08)!important;}',
    '.MuiAccordionSummary-root{color:#e8e8f0!important;border-bottom:1px solid rgba(255,255,255,0.06)!important;}',
    '.MuiAccordionSummary-content{color:var(--map-game-color,#f5c518)!important;}',
    '.MuiAccordionSummary-content *{color:#e8e8f0!important;}',
    '.MuiIcon-colorInfo{color:var(--map-game-color,#f5c518)!important;}',
    '.MuiAccordionSummary-expandIconWrapper .MuiIcon-root{color:#e8e8f0!important;}',
    '.MuiAccordionDetails-root,.MuiCollapse-root{background-color:rgba(13,15,26,0.96)!important;}',
    '.MuiFormLabel-root{color:var(--map-game-color,#f5c518)!important;font-weight:700!important;}',
    '.MuiFormControlLabel-label,.MuiTypography-root{color:#e8e8f0!important;}',
    '.MuiCheckbox-root{color:#4a4d6a!important;}',
    '.MuiCheckbox-root.Mui-checked{color:var(--map-game-color,#f5c518)!important;}',
    '.MuiRadio-root{color:#4a4d6a!important;}',
    '.MuiRadio-root.Mui-checked{color:var(--map-game-color,#f5c518)!important;}',
    '.MuiDivider-root{border-color:rgba(255,255,255,0.07)!important;}',
    '.MuiIconButton-root{color:#6b6d85!important;}',
    '.MuiIconButton-root:hover{color:#e8e8f0!important;background-color:rgba(255,255,255,0.06)!important;}',
    '.MuiAccordion-root:before{background-color:rgba(255,255,255,0.06)!important;}',
    // ─── Mobile tap-target fix ────────────────────────────────────────────
    // Trainer markers live inside a pan/zoom region (their containers have
    // cursor:all-scroll, indicating a drag handle). On touch devices, the
    // pan handler grabbed the touchstart and the underlying MUI checkbox
    // never saw a click. `touch-action: manipulation` tells the browser
    // these are quick-tap targets — well-behaved pan libs back off.
    '.MuiCheckbox-root,.MuiCheckbox-root *,.MuiFormControlLabel-root,.MuiRadio-root,.MuiIconButton-root,input[type="checkbox"],input[type="radio"],.trainer-info,.trainer-name,.checkbox-label{touch-action:manipulation!important;}',
    '.MuiCheckbox-root,.MuiFormControlLabel-root,.MuiRadio-root,input[type="checkbox"],input[type="radio"],.checkbox-label{cursor:pointer!important;}',
    // ─── Trainer marker pointer-events fix ───────────────────────────────
    // The 367 trainer-marker wrappers (immediate children of every
    // .react-portal-container) carry onClick + onTouchEnd handlers in the
    // minified bundle but their computed `pointer-events: none` means the
    // browser can never hit-test them. Force pe:auto so taps actually
    // reach the toggle.
    '.react-portal-container,.react-portal-container>div,.react-portal-container .tooltip,.react-portal-container .trainer-info,.react-portal-container .trainer-info-section,.react-portal-container .trainer-info-icon,.react-portal-container .trainer-name{pointer-events:auto!important;}'
  ].join('');
  function applyTheme(color){
    document.documentElement.style.setProperty('--map-game-color', color);
    var existing=document.getElementById('eguide-theme');
    if(existing) existing.parentNode.removeChild(existing);
    var s=document.createElement('style');
    s.id='eguide-theme';
    s.textContent=THEME_CSS;
    (document.head||document.documentElement).appendChild(s);
  }
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='mapGameColor') applyTheme(e.data.color||'#f5c518');
  });

  // ─── Mobile tap bridge ────────────────────────────────────────────────
  // The map uses react-map-interaction whose drag-vs-click threshold is
  // ONE pixel — so any real touchscreen tap gets classified as a drag and
  // the underlying <a class="click-zone"> never receives a click. Detect
  // a quick tap with minimal movement and fire the click manually.
  var _tapStartX = 0, _tapStartY = 0, _tapTarget = null, _tapTime = 0;
  document.addEventListener('touchstart', function(ev) {
    if (ev.touches.length !== 1) { _tapTarget = null; return; }
    var t = ev.touches[0];
    _tapStartX = t.clientX; _tapStartY = t.clientY; _tapTime = Date.now();
    _tapTarget = document.elementFromPoint(t.clientX, t.clientY);
  }, { capture: true, passive: true });
  document.addEventListener('touchend', function(ev) {
    if (!_tapTarget || ev.changedTouches.length !== 1) { _tapTarget = null; return; }
    var t = ev.changedTouches[0];
    var dx = Math.abs(t.clientX - _tapStartX);
    var dy = Math.abs(t.clientY - _tapStartY);
    var dt = Date.now() - _tapTime;
    if (dx < 10 && dy < 10 && dt < 600) {
      var node = _tapTarget;
      while (node && node !== document.body) {
        if (node.classList && node.classList.contains('click-zone')) {
          // Fire click directly — bypasses the library's drag suppression
          try { node.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, view: window })); } catch (e) {}
          break;
        }
        node = node.parentNode;
      }
    }
    _tapTarget = null;
  }, { capture: false, passive: true });
})();
